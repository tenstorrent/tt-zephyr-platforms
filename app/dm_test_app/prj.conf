# Basic configuration for hello world application
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_FLASH=y

# Debug Configuration
CONFIG_DEBUG=y

# Disable watchdog for debugging
CONFIG_WATCHDOG=n

# Logging
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_KERNEL_LOG_LEVEL_OFF=y
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_BUFFER_SIZE=32768

# create build/zephyr/zephyr.lst
CONFIG_OUTPUT_DISASSEMBLY=y

# Shell configuration
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="dm_test_app:~$ "
CONFIG_SHELL_TAB=y
CONFIG_SHELL_TAB_AUTOCOMPLETION=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_HELP=y

# Shell subsystems
CONFIG_GPIO_SHELL=y
CONFIG_I2C_SHELL=y
CONFIG_SPI_SHELL=y
CONFIG_FLASH_SHELL=y
CONFIG_LOG_CMDS=y
