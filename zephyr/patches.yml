  - path: zephyr/arch-arc-support-CONFIG_ROM_START_OFFSET.patch
    sha256sum: a320295d837b5a4f926565dcd3565a42b4504ea377da913d0cd272ef3eaf2e3f
    module: zephyr
    author: Daniel DeGrasse
    email: ddegrasse@tenstorrent.com
    date: 2025-06-26
    upstreamable: true
    merge-pr: https://github.com/zephyrproject-rtos/zephyr/pull/92254
    comments: |
      Adds support for CONFIG_ROM_START_OFFSET on ARC processors. Note that the
      arc ISA requires vector table offset to be at a 1024 KiB boundary, so
      the default ROM_START_OFFSET when using MCUBoot must be increased.
