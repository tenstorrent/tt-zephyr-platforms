    email: ddegrasse@tenstorrent.com
    date: 2025-01-01
    upstreamable: true
    merge-pr: https://github.com/zephyrproject-rtos/zephyr/pull/85254/files
    comments: |
      This patch adds support for loading mcuboot images from RAM, which is useful for
      testing and development purposes.
  - path: mcuboot/boot-zephyr-add-support-for-revert-mode-with-ramload.patch
    sha256sum: c17c7abb1f5dbc121605a31ca7ba9564beae8ea0071121b914d842ab97441f2d
    module: mcuboot
    author: Daniel DeGrasse
    email: ddegrasse@tenstorrent.com
    date: 2025-06-25
    upstreamable: true
    merge-pr: https://github.com/mcu-tools/mcuboot/pull/2197
    comments: |
      Adds support for revert mode with RAM load in MCUBoot. This allows us to
      load an image in test mode, and then revert to the previous image
      if the image fails.
