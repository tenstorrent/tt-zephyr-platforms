description: |
  Tenstorrent Grendel CGM

compatible: "tenstorrent,grendel-clock-control"

include: [clock-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: true

  "#clock-cells":
    const: 0

  max-frequency:
    type: int
    required: false
    description: |
      Maximum output frequency in MHz.

  clocks:
    required: true
    description: |
      Phandle to the reference clock.
