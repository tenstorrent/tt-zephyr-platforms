description: Tenstorrent Flash Partitions

include: ["fixed-partitions.yaml"]

compatible: tenstorrent,tt-boot-fs

properties:
  flash-device-size:
    type: int
    required: true
  flash-block-size:
    type: int
    required: true

child-binding:
  properties:
    binary-path:
      type: string
      required: true
    source-address:
      type: string
      description: |
        The source address for the binary, used to set where the binary is
        placed within the boot-fs. Encoded as a string so that special formats
        like "$END-0xADDR" can be used.
