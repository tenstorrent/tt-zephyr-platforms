      - tt_blackhole@p150a/tt_blackhole/smc
      - tt_blackhole@p150b/tt_blackhole/smc
      - tt_blackhole@p300a/tt_blackhole/smc
    extra_configs:
      - CONFIG_DEVICE_TEST=y
    tags:
      - bh_arc
      - smoke
