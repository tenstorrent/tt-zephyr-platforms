    platform_allow: native_sim
    tags: bh_arc
  lib.tenstorrent.bh_arc.tt_shell:
    platform_allow: native_sim
    build_only: true
    extra_configs:
      - CONFIG_SHELL=y
    tags: bh_arc
  lib.tenstorrent.bh_arc.device_test:
